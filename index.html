<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Firebase Test</title>
<style>
body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#1a1a18;color:white;gap:16px}
.box{background:#2C2416;border-radius:12px;padding:24px 32px;text-align:center;max-width:400px;width:90%}
h1{font-size:20px;margin-bottom:8px}
p{font-size:14px;color:#A8906C;margin:0}
.status{font-size:16px;font-weight:600;padding:12px 24px;border-radius:8px;margin-top:16px}
.ok{background:#1A5A45;color:#9FE1CB}
.err{background:#5A1A1A;color:#E8A0A0}
.pending{background:#3A3A1A;color:#E8D0A0}
button{padding:10px 20px;background:#2D7D62;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;margin-top:12px}
</style>
</head>
<body>
<div class="box">
  <h1>🏡 Firebase Connection Test</h1>
  <p>Testing if Firebase can connect from GitHub Pages</p>
  <div class="status pending" id="status">Testing…</div>
  <div id="detail" style="font-size:12px;color:#A8906C;margin-top:8px;line-height:1.6"></div>
  <button onclick="runTest()">Run test again</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const st = document.getElementById('status');
const dt = document.getElementById('detail');

function runTest(){
  st.className='status pending';
  st.textContent='Testing…';
  dt.textContent='Step 1: Loading Firebase SDK…';

  try {
    dt.textContent='Step 2: Initialising Firebase…';
    if(!firebase.apps.length){
      firebase.initializeApp({
        apiKey: "AIzaSyAgeXcn_f9YkI7XvKsTWGXpnsEfDWPhlfY",
        authDomain: "moving-planner-39bd8.firebaseapp.com",
        databaseURL: "https://moving-planner-39bd8-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "moving-planner-39bd8",
        storageBucket: "moving-planner-39bd8.firebasestorage.app",
        messagingSenderId: "226454824568",
        appId: "1:226454824568:web:1a577c10fd9c7ff89c6f8d"
      });
    }
    dt.textContent='Step 3: Firebase initialised ✓. Trying to write to database…';

    firebase.database().ref('test').set({time: Date.now(), from: 'github-pages-test'})
      .then(()=>{
        st.className='status ok';
        st.textContent='✓ Firebase is working!';
        dt.textContent='Write succeeded. We can now fix the main app.';
      })
      .catch((err)=>{
        st.className='status err';
        st.textContent='✗ Database write failed';
        dt.innerHTML='Error code: <b>'+err.code+'</b><br>Message: '+err.message;
      });

  } catch(e){
    st.className='status err';
    st.textContent='✗ Firebase init failed';
    dt.textContent='Error: ' + e.message;
  }
}

window.onload = runTest;
</script>
</body>
</html>
